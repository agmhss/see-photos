<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMHSS Smart School - Timestamp Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --ticker-height: 300px;
            --timestamp-color: rgba(255, 253, 230, 0.4); /* Creamy white, 0.4 opacity */
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls { margin: 30px 0; text-align: center; width: 90%; max-width: 600px; }
        
        .input-group { display: flex; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-radius: 25px; overflow: hidden; }
        input { flex: 1; padding: 15px 20px; border: none; background: #1e293b; color: white; outline: none; }
        button { padding: 15px 25px; border: none; background: var(--accent-color); color: #0f172a; font-weight: bold; cursor: pointer; }

        /* Ticker Logic */
        .ticker-container {
            width: 100%;
            height: var(--ticker-height);
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            border-y: 1px solid #334155;
            position: relative;
        }

        .ticker-track {
            display: flex;
            white-space: nowrap;
            animation: scroll-left 60s linear infinite;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Photo Wrapper for Overlay */
        .photo-item {
            position: relative;
            height: calc(var(--ticker-height) - 40px);
            margin: 0 15px;
            flex-shrink: 0;
            display: inline-block;
        }

        .photo-item img {
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            transition: 0.4s ease;
            cursor: pointer;
        }

        /* Timestamp Overlay */
        .metadata-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            color: var(--timestamp-color);
            text-align: right;
            pointer-events: none; /* Let clicks pass through to the image */
            line-height: 1.2;
        }

        /* Zoom Logic */
        .photo-item:hover img {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2.8);
            z-index: 9999;
            outline: 5000px solid rgba(0,0,0,0.8);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* Show full opacity and larger text on zoom */
        .photo-item:hover .metadata-overlay {
            position: fixed;
            z-index: 10000;
            bottom: 10%;
            right: 10%;
            font-size: 24px;
            color: rgba(255, 253, 230, 0.8);
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Smart School - Ticker v2.0</h2>
        <div class="input-group">
            <input type="text" id="albumLink" placeholder="Paste Google Photos Link...">
            <button onclick="startGallery()">LAUNCH</button>
        </div>
        <div id="status" style="margin-top:10px; color: #94a3b8;">Enter link to see timestamps & contributors</div>
    </div>

    <div class="ticker-container" id="tickerFrame" style="display:none;">
        <div class="ticker-track" id="photo-track"></div>
    </div>

    <script>
        let resumeTimer;
        const track = document.getElementById('photo-track');

        async function startGallery() {
            const url = document.getElementById('albumLink').value.trim();
            if(!url) return;

            track.innerHTML = "";
            document.getElementById('status').innerText = "Processing metadata...";
            
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // Regex to find image links
                const regex = /"(https:\/\/lh3\.googleusercontent\.com\/pw\/[a-zA-Z0-9\-_]*)"/g;
                const links = Array.from(new Set([...data.contents.matchAll(regex)].map(m => m[1])));

                if (links.length === 0) throw new Error("No photos found.");

                // For a Shared Album, individual names/dates aren't in the HTML source in a simple way.
                // We will simulate the "Current Date" or a generic "AGMHSS Contributor" 
                // unless you want to manually hardcode a list.
                const today = new Date().toLocaleDateString('en-GB'); 

                [...links, ...links].forEach((src, index) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'photo-item';
                    
                    const img = document.createElement('img');
                    img.src = `${src}=w800`;
                    
                    // The Overlay
                    const overlay = document.createElement('div');
                    overlay.className = 'metadata-overlay';
                    // Using today's date and a generic name placeholder
                    overlay.innerHTML = `${today}<br>ADDED BY: RAJARAJAN`;

                    wrapper.appendChild(img);
                    wrapper.appendChild(overlay);

                    // Pause/Resume Logic
                    wrapper.addEventListener('mouseenter', () => {
                        track.style.animationPlayState = 'paused';
                        clearTimeout(resumeTimer);
                        resumeTimer = setTimeout(() => { track.style.animationPlayState = 'running'; }, 10000);
                    });

                    wrapper.addEventListener('dblclick', () => {
                        track.style.animationPlayState = 'running';
                        clearTimeout(resumeTimer);
                    });

                    track.appendChild(wrapper);
                });

                document.getElementById('tickerFrame').style.display = "flex";
                document.getElementById('status').innerText = "Active: Hover to see details.";

            } catch (err) {
                document.getElementById('status').innerText = "Error loading: " + err.message;
            }
        }
    </script>
</body>
</html>
