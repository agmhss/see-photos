<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMHSS Smart Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --accent: #38bdf8;
            --cream: rgba(255, 253, 230, 0.3);
            --h: 380px;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1 {
            margin: 60px 20px 20px;
            letter-spacing: 3px;
            font-size: 2.2rem;
            text-align: center;
        }

        .search-area {
            margin: 20px 0 30px;
            width: 90%;
            max-width: 720px;
            display: flex;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.25);
            border-radius: 50px;
            overflow: hidden;
            background: #1e293b;
        }

        #albumLink {
            flex: 1;
            padding: 18px 25px;
            border: none;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
        }

        #loadBtn {
            padding: 0 35px;
            background: var(--accent);
            color: #020617;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        #loadBtn:hover { background: white; transform: scale(1.05); }

        .ticker-frame {
            width: 100%;
            height: var(--h);
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            border-top: 1px solid #1e293b;
            border-bottom: 1px solid #1e293b;
            overflow: hidden;
        }

        .track {
            display: flex;
            white-space: nowrap;
            animation: scroll 65s linear infinite;
            padding: 20px 0;
        }

        @keyframes scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .photo-wrap {
            position: relative;
            height: calc(var(--h) - 70px);
            margin: 0 18px;
            flex-shrink: 0;
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .photo-wrap img {
            height: 100%;
            width: auto;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .timestamp {
            position: absolute;
            bottom: 10px;
            right: 14px;
            font-family: 'Orbitron', sans-serif;
            color: var(--cream);
            font-size: 11px;
            text-align: right;
            line-height: 1.3;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        #zoom-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #zoom-overlay img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 12px;
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
        }

        #status {
            color: #64748b;
            margin-top: 12px;
            font-size: 0.95rem;
            text-align: center;
            min-height: 1.2em;
        }

        .loading { color: var(--accent); }
    </style>
</head>
<body>

    <h1>SMART SCHOOL TICKER</h1>

    <div class="search-area">
        <input type="text" id="albumLink" placeholder="Paste Google Photos Album Link here...">
        <button id="loadBtn">LOAD</button>
    </div>
    
    <div id="status">Link will be saved for your next visit.</div>

    <div class="ticker-frame" id="frame">
        <div class="track" id="track"></div>
    </div>

    <div id="zoom-overlay">
        <img id="zoom-img" alt="Zoomed photo">
    </div>

    <script>
        const input = document.getElementById('albumLink');
        const track = document.getElementById('track');
        const frame = document.getElementById('frame');
        const status = document.getElementById('status');
        const zoomOverlay = document.getElementById('zoom-overlay');
        const zoomImg = document.getElementById('zoom-img');

        let resumeTimer = null;
        let isPaused = false;

        window.onload = () => {
            const saved = localStorage.getItem('agmhss_album_link');
            if (saved) {
                input.value = saved;
                run();
            }
        };

        input.addEventListener('change', () => {
            if (input.value.trim()) localStorage.setItem('agmhss_album_link', input.value.trim());
        });

        async function run() {
            const url = input.value.trim();
            if (!url) {
                status.textContent = "Please paste a valid Google Photos album link.";
                return;
            }

            localStorage.setItem('agmhss_album_link', url);
            track.innerHTML = '';
            frame.style.display = 'none';
            status.classList.add('loading');
            status.textContent = 'Fetching album... (this may take 8–15 seconds)';

            try {
                const proxies = [
                    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                    `https://corsproxy.io/?${encodeURIComponent(url)}`
                ];

                let html = '';

                for (const proxyUrl of proxies) {
                    try {
                        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(20000) });
                        const data = await res.json();

                        // Handle both formats: {contents: "..."} or direct HTML string
                        html = (data && typeof data === 'object' && data.contents) 
                               ? data.contents 
                               : (typeof data === 'string' ? data : JSON.stringify(data));

                        if (html.length > 10000) break;
                    } catch (e) {
                        console.warn('Proxy attempt failed:', e);
                    }
                }

                if (!html || html.length < 5000) {
                    throw new Error("Could not load the album page. Please ensure it is publicly shared with \"Anyone with the link\".");
                }

                // Robust image URL extraction
                let imageUrls = [];

                // Primary patterns for Google Photos
                const patterns = [
                    /https:\/\/lh3\.googleusercontent\.com\/[a-zA-Z0-9\-_\/=]+/g,
                    /https:\/\/photos\.fife\.usercontent\.google\.com\/[a-zA-Z0-9\-_\/=]+/g,
                    /https?:\/\/[^"'\s>]+?\.googleusercontent\.com\/[^"'\s>]+/g   // fallback aggressive
                ];

                for (const regex of patterns) {
                    const matches = html.matchAll(regex);
                    for (const match of matches) {
                        imageUrls.push(match[0]);
                    }
                }

                // Remove duplicates and clean
                const uniqueImages = [...new Set(imageUrls)].filter(src => 
                    src.includes('googleusercontent.com') && 
                    !src.includes('=w') && // avoid already resized thumbnails
                    src.length > 40
                );

                if (uniqueImages.length === 0) {
                    throw new Error("No photos found in the album. Make sure the album is public and contains images.");
                }

                const dateStr = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');

                const allImages = [...uniqueImages, ...uniqueImages];

                allImages.forEach(src => {
                    const wrap = document.createElement('div');
                    wrap.className = 'photo-wrap';

                    const img = document.createElement('img');
                    img.src = `${src}=w1200`;
                    img.referrerPolicy = "no-referrer";
                    img.loading = "lazy";

                    const meta = document.createElement('div');
                    meta.className = 'timestamp';
                    meta.innerHTML = `${dateStr}<br>BY: RAJARAJAN`;

                    wrap.append(img, meta);

                    wrap.addEventListener('click', () => {
                        zoomImg.src = `${src}=w2000`;
                        zoomImg.referrerPolicy = "no-referrer";
                        zoomOverlay.style.display = 'flex';
                        pauseScroll();
                    });

                    track.appendChild(wrap);
                });

                frame.style.display = 'flex';
                status.classList.remove('loading');
                status.textContent = `Loaded ${uniqueImages.length} photos • Tap image to zoom • Tap ticker to pause/resume`;

                // Scroll controls
                const pauseScroll = () => {
                    track.style.animationPlayState = 'paused';
                    isPaused = true;
                    clearTimeout(resumeTimer);
                };

                const resumeScroll = () => {
                    track.style.animationPlayState = 'running';
                    isPaused = false;
                };

                track.addEventListener('mouseenter', pauseScroll);
                track.addEventListener('mouseleave', () => {
                    if (!isPaused) resumeScroll();
                });

                track.addEventListener('click', (e) => {
                    if (e.target.closest('#zoom-overlay')) return;
                    isPaused ? resumeScroll() : pauseScroll();
                });

                track.addEventListener('mouseleave', () => {
                    clearTimeout(resumeTimer);
                    resumeTimer = setTimeout(() => {
                        if (!isPaused) resumeScroll();
                    }, 12000);
                });

            } catch (err) {
                status.classList.remove('loading');
                status.textContent = `Error: ${err.message}`;
                console.error(err);
            }
        }

        document.getElementById('loadBtn').addEventListener('click', run);

        zoomOverlay.addEventListener('click', () => {
            zoomOverlay.style.display = 'none';
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') zoomOverlay.style.display = 'none';
        });
    </script>
</body>
    </html>
