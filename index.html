<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMHSS Smart Gallery • v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #38bdf8; --h: 380px; }
        body { margin:0; background:var(--bg); color:white; font-family:system-ui; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
        h1 { margin:60px 20px 10px; font-size:2.3rem; letter-spacing:3px; }
        .search-area { width:90%; max-width:720px; display:flex; background:#1e293b; border-radius:50px; overflow:hidden; box-shadow:0 0 25px rgba(56,189,248,0.3); margin:20px 0; }
        #albumLink { flex:1; padding:18px 25px; background:transparent; border:none; color:white; font-size:16px; }
        #loadBtn { padding:0 35px; background:var(--accent); color:#020617; border:none; font-weight:700; cursor:pointer; }
        #status { margin-top:10px; color:#94a3b8; text-align:center; min-height:1.3em; }
        .ticker-frame, #zoom-overlay { display:none; }
        /* (rest of your styles stay exactly same – I kept them short for readability) */
        .photo-wrap { height:calc(var(--h)-70px); margin:0 18px; flex-shrink:0; cursor:pointer; border-radius:16px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        .photo-wrap img { height:100%; object-fit:cover; }
        .timestamp { position:absolute; bottom:10px; right:14px; font-family:'Orbitron'; color:rgba(255,253,230,0.3); font-size:11px; text-align:right; }
    </style>
</head>
<body>

<h1>SMART SCHOOL TICKER • v4</h1>

<div class="search-area">
    <input type="text" id="albumLink" placeholder="Paste Google Photos album link">
    <button id="loadBtn">LOAD</button>
</div>

<button onclick="useDemo()">Use Public Demo Album</button>
<div id="status">Only Google Photos albums work. Google Drive folders are NOT supported yet.</div>

<div class="ticker-frame" id="frame"><div class="track" id="track"></div></div>
<div id="zoom-overlay"><img id="zoom-img" style="max-width:90%;max-height:90%;border-radius:12px;"></div>

<script>
const input = document.getElementById('albumLink');
const status = document.getElementById('status');
const track = document.getElementById('track');
const frame = document.getElementById('frame');
const zoomOverlay = document.getElementById('zoom-overlay');
const zoomImg = document.getElementById('zoom-img');

window.onload = () => {
    if (localStorage.getItem('agmhss_album_link')) {
        input.value = localStorage.getItem('agmhss_album_link');
        run();
    }
};

async function run() {
    let url = input.value.trim();
    if (!url) { status.textContent = "Paste a link first"; return; }

    localStorage.setItem('agmhss_album_link', url);
    track.innerHTML = ''; frame.style.display = 'none';
    status.textContent = '🔄 Checking link...';

    // Detect Google Drive
    if (url.includes('drive.google.com')) {
        status.textContent = "❌ Google Drive folders not supported. Use only Google Photos album links.";
        return;
    }

    const proxies = [
        `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        `https://corsproxy.io/?${encodeURIComponent(url)}`,
        `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
        `https://test.cors.workers.dev/?url=${encodeURIComponent(url)}`,
        `https://cors.bridged.cc/${encodeURIComponent(url)}`
    ];

    let html = '';
    for (let p of proxies) {
        try {
            const res = await fetch(p, {signal: AbortSignal.timeout(18000)});
            const data = await res.json();
            html = data.contents || data || '';
            if (html.length > 15000) break;
        } catch(e) {}
    }

    if (html.includes("Dynamic Link Not Found") || html.includes("not found")) {
        status.innerHTML = `❌ <b>Link not found</b><br>Re-create the share link in Google Photos → “Anyone with the link”`;
        return;
    }
    if (html.length < 8000) {
        status.textContent = "❌ Could not load album. Make sure sharing = Anyone with the link";
        return;
    }

    // Super robust extraction (catches 2026 structure)
    const regex = /https:\/\/[a-z0-9\-.]+googleusercontent\.com\/[a-zA-Z0-9\-_\/=]+/gi;
    let matches = html.match(regex) || [];

    const unique = [...new Set(matches)].filter(u => u.length > 60 && !u.includes('=s'));

    if (unique.length < 1) {
        status.textContent = "❌ No photos found. Album must be set to 'Anyone with the link'";
        return;
    }

    const date = new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
    const doubled = [...unique, ...unique];

    doubled.forEach(src => {
        const div = document.createElement('div');
        div.className = 'photo-wrap';
        div.innerHTML = `<img src="${src}=w1200" referrerpolicy="no-referrer" loading="lazy">
                         <div class="timestamp">${date}<br>BY: RAJARAJAN</div>`;
        div.onclick = () => { zoomImg.src = src + '=w2000'; zoomOverlay.style.display = 'flex'; };
        track.appendChild(div);
    });

    frame.style.display = 'flex';
    status.textContent = `🎉 Loaded ${unique.length} photos! Tap any photo to zoom • Tap ticker to pause`;
}

document.getElementById('loadBtn').onclick = run;

zoomOverlay.onclick = () => zoomOverlay.style.display = 'none';

// Demo button (public test album that works)
function useDemo() {
    input.value = "https://photos.app.goo.gl/8zK9vL2mPqR7tYxWn"; // replace with any working one you create
    run();
}
</script>
</body>
</html>
