<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMHSS Smart Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --accent: #38bdf8;
            --cream: rgba(255, 253, 230, 0.3);
            --h: 350px;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Persistent Input Section */
        .search-area {
            margin: 50px 0;
            width: 90%;
            max-width: 700px;
            display: flex;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            border-radius: 50px;
            overflow: hidden;
            background: #1e293b;
        }

        #albumLink {
            flex: 1;
            padding: 18px 25px;
            border: none;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
        }

        #loadBtn {
            padding: 0 30px;
            background: var(--accent);
            color: #020617;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #loadBtn:hover { background: white; }

        /* Ticker Container */
        .ticker-frame {
            width: 100%;
            height: var(--h);
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            border-y: 1px solid #1e293b;
            overflow: hidden;
        }

        .track {
            display: flex;
            white-space: nowrap;
            animation: scroll 60s linear infinite;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .photo-wrap {
            position: relative;
            height: calc(var(--h) - 80px);
            margin: 0 20px;
            flex-shrink: 0;
        }

        .photo-wrap img {
            height: 100%;
            border-radius: 15px;
            transition: transform 0.5s ease;
            cursor: pointer;
            object-fit: cover;
        }

        /* Digital Metadata */
        .timestamp {
            position: absolute;
            bottom: 12px;
            right: 15px;
            font-family: 'Orbitron', sans-serif;
            color: var(--cream);
            font-size: 10px;
            text-align: right;
            pointer-events: none;
            line-height: 1.4;
        }

        /* Hover Zoom Engine */
        .photo-wrap:hover img {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2.8);
            z-index: 9999;
            outline: 5000px solid rgba(0,0,0,0.85);
            box-shadow: 0 0 100px #000;
        }

        .photo-wrap:hover .timestamp {
            position: fixed;
            z-index: 10000;
            bottom: 10%;
            right: 10%;
            font-size: 24px;
            color: rgba(255, 253, 230, 0.7);
        }

        #status { color: #64748b; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1 style="margin-top: 60px; letter-spacing: 2px;">SMART SCHOOL TICKER</h1>

    <div class="search-area">
        <input type="text" id="albumLink" placeholder="Paste Google Photos Album Link here...">
        <button id="loadBtn" onclick="run()">LOAD</button>
    </div>
    
    <div id="status">Link will be saved for your next visit.</div>

    <div class="ticker-frame" id="frame">
        <div class="track" id="track"></div>
    </div>

    <script>
        let resumeTimer;
        const input = document.getElementById('albumLink');
        const track = document.getElementById('track');
        const frame = document.getElementById('frame');
        const status = document.getElementById('status');

        // 1. Persistence: Load link from local storage on startup
        window.onload = () => {
            const savedLink = localStorage.getItem('agmhss_album_link');
            if (savedLink) {
                input.value = savedLink;
                run(); // Auto-load if link exists
            }
        };

        async function run() {
            const url = input.value.trim();
            if(!url) return;

            // Save to local storage so it stays there
            localStorage.setItem('agmhss_album_link', url);

            track.innerHTML = "";
            status.innerText = "Syncing with Cloud...";
            
            try {
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const res = await fetch(proxy);
                const data = await res.json();
                
                const regex = /"(https:\/\/lh3\.googleusercontent\.com\/pw\/[a-zA-Z0-9\-_]*)"/g;
                const images = Array.from(new Set([...data.contents.matchAll(regex)].map(m => m[1])));

                if(images.length === 0) throw new Error("No public photos found.");

                const dateStr = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');

                // Generate Ticker Content
                [...images, ...images].forEach(src => {
                    const wrap = document.createElement('div');
                    wrap.className = 'photo-wrap';

                    const img = document.createElement('img');
                    img.src = `${src}=w1200`; // High-res for the zoom

                    const meta = document.createElement('div');
                    meta.className = 'timestamp';
                    meta.innerHTML = `${dateStr}<br>BY: RAJARAJAN`;

                    wrap.appendChild(img);
                    wrap.appendChild(meta);

                    // Interactions
                    wrap.addEventListener('mouseenter', () => {
                        track.style.animationPlayState = 'paused';
                        clearTimeout(resumeTimer);
                        resumeTimer = setTimeout(() => track.style.animationPlayState = 'running', 10000);
                    });

                    wrap.addEventListener('dblclick', () => {
                        track.style.animationPlayState = 'running';
                        clearTimeout(resumeTimer);
                    });

                    track.appendChild(wrap);
                });

                frame.style.display = "flex";
                status.innerText = `Displaying ${images.length} images. Double-tap to resume scroll.`;

            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
    </html>
