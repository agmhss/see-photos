<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMHSS | Infinite Photo Stream</title>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #38bdf8;
            --height: 280px;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .header {
            padding: 2rem;
            text-align: center;
            background: rgba(0,0,0,0.3);
        }

        /* The Ticker System */
        .ticker-viewport {
            width: 100%;
            height: var(--height);
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            border-y: 1px solid #334155;
            overflow: hidden;
        }

        .ticker-track {
            display: flex;
            flex-direction: row;
            white-space: nowrap;
            will-change: transform;
            /* Animation starts slow, then speeds up as photos load */
            animation: scroll 60s linear infinite;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-track img {
            height: calc(var(--height) - 60px);
            margin: 0 10px;
            border-radius: 12px;
            cursor: zoom-in;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            object-fit: cover;
        }

        .ticker-track img.loaded {
            opacity: 1;
            transform: scale(1);
        }

        /* Hover Zoom Logic */
        .ticker-track img:hover {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2.2);
            z-index: 9999;
            box-shadow: 0 0 80px rgba(0,0,0,1);
            outline: 5000px solid rgba(0,0,0,0.8);
            cursor: zoom-out;
        }

        /* UI Elements */
        #status-bar {
            text-align: center;
            padding: 10px;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">AGMHSS Digital Gallery</h2>
        <p style="opacity:0.7">Hover to Inspect • Double-Tap to Resume</p>
    </div>

    <div class="ticker-viewport">
        <div class="ticker-track" id="track"></div>
    </div>

    <div id="status-bar">
        <span class="loader" id="spinner"></span>
        <span id="msg">Initializing stream...</span>
    </div>

    <script>
        // REPLACE THIS WITH YOUR SHARED GOOGLE PHOTOS LINK
        const ALBUM_URL = 'https://photos.app.goo.gl/your-album-link-here';
        
        const track = document.getElementById('track');
        const msg = document.getElementById('msg');
        const spinner = document.getElementById('spinner');
        let resumeTimer;

        // 1. Setup global resume function
        function resume() {
            track.style.animationPlayState = 'running';
            msg.innerText = "Hover to zoom. Ticker active.";
            clearTimeout(resumeTimer);
        }

        // 2. Add interactions to each image
        function attachEvents(img) {
            img.addEventListener('mouseenter', () => {
                track.style.animationPlayState = 'paused';
                msg.innerText = "Paused. Auto-resuming in 10s...";
                clearTimeout(resumeTimer);
                resumeTimer = setTimeout(resume, 10000);
            });

            img.addEventListener('dblclick', resume);
        }

        // 3. The Streamer Logic
        async function loadStream() {
            try {
                // CHANGED TO CORSPROXY.IO
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(ALBUM_URL)}`;
                const response = await fetch(proxyUrl);
                const html = await response.text();
                
                // Extracting photos using regex
                const regex = /"(https:\/\/lh3\.googleusercontent\.com\/pw\/[a-zA-Z0-9\-_]*)"/g;
                let match;
                const uniquePhotos = [];

                while ((match = regex.exec(html)) !== null) {
                    if (!uniquePhotos.includes(match[1])) {
                        const photoUrl = match[1];
                        uniquePhotos.push(photoUrl);

                        // Injecting immediately into the DOM
                        const img = document.createElement('img');
                        img.src = `${photoUrl}=w800`;
                        attachEvents(img);
                        track.appendChild(img);

                        // Small delay for smooth entry
                        setTimeout(() => img.classList.add('loaded'), 50);
                        
                        msg.innerText = `Loading Gallery... (${uniquePhotos.length} photos found)`;
                    }
                }

                // 4. Logistics: Duplicate for Infinite Scroll ONLY after all found
                if (uniquePhotos.length > 0) {
                    uniquePhotos.forEach(url => {
                        const clone = document.createElement('img');
                        clone.src = `${url}=w800`;
                        clone.className = 'loaded'; // Clones appear instantly
                        attachEvents(clone);
                        track.appendChild(clone);
                    });
                    
                    spinner.style.display = 'none';
                    msg.innerText = `Loaded ${uniquePhotos.length} photos. Continuous loop ready.`;
                } else {
                    msg.innerText = "No photos found. Check if album is public.";
                }

            } catch (err) {
                console.error(err);
                msg.innerText = "Error fetching album. Please refresh.";
            }
        }

        // Start the process
        loadStream();
    </script>
</body>
</html>
