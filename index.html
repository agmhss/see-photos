<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMHSS Smart Ticker</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --ticker-height: 250px;
            --zoom-speed: 0.4s;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            color: white;
            padding: 20px;
            background: linear-gradient(90deg, #004e92, #000428);
        }

        /* Ticker Container */
        .ticker-container {
            width: 100%;
            height: var(--ticker-height);
            background: #000;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            border-top: 2px solid #444;
            border-bottom: 2px solid #444;
            margin-top: 50px;
        }

        /* The moving track */
        .ticker-track {
            display: flex;
            white-space: nowrap;
            animation: scroll-left 40s linear infinite;
            will-change: transform;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-track img {
            height: calc(var(--ticker-height) - 40px);
            margin: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform var(--zoom-speed) ease;
            object-fit: cover;
        }

        /* Full Page Zoom Effect */
        .ticker-track img:hover {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2.5);
            z-index: 10000;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            outline: 5000px solid rgba(0,0,0,0.7); /* Creates the backdrop dimming */
        }

        /* Status Message */
        #status {
            color: #aaa;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>AGMHSS Patteeswaram - Gallery Ticker</h1>
        <p>Hover to Zoom | Double-Click to Resume</p>
    </div>

    <div class="ticker-container">
        <div class="ticker-track" id="photo-track">
            </div>
    </div>

    <div id="status">Connecting to Google Photos Album...</div>

    <script>
        // PASTE YOUR GOOGLE PHOTOS SHARED LINK HERE
        const ALBUM_URL = 'https://photos.app.goo.gl/your-album-link-here'; 
        
        const track = document.getElementById('photo-track');
        const status = document.getElementById('status');
        let resumeTimer;

        async function fetchGooglePhotos(url) {
            try {
                // Using AllOrigins proxy to bypass CORS
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // Regex to find Google Photo direct image links
                const regex = /"(https:\/\/lh3\.googleusercontent\.com\/pw\/[a-zA-Z0-9\-_]*)"/g;
                const links = new Set();
                let match;
                
                while ((match = regex.exec(data.contents)) !== null) {
                    links.add(match[1]);
                }

                return Array.from(links);
            } catch (error) {
                console.error("Error fetching photos:", error);
                status.innerText = "Error loading photos. Please check the Album Link.";
                return [];
            }
        }

        function createImgElement(src) {
            const img = document.createElement('img');
            // Adding =w800 for better resolution
            img.src = `${src}=w800`;
            
            // Hover logic: Pause scroll
            img.addEventListener('mouseenter', () => {
                track.style.animationPlayState = 'paused';
                status.innerText = "Paused. Resuming in 10s...";
                
                clearTimeout(resumeTimer);
                resumeTimer = setTimeout(() => {
                    resumeScroll();
                }, 10000);
            });

            // Double Click logic: Resume scroll
            img.addEventListener('dblclick', () => {
                resumeScroll();
            });

            return img;
        }

        function resumeScroll() {
            track.style.animationPlayState = 'running';
            status.innerText = "Hover over a photo to zoom.";
            clearTimeout(resumeTimer);
        }

        async function initApp() {
            const images = await fetchGooglePhotos(ALBUM_URL);
            
            if (images.length === 0) {
                status.innerText = "No photos found. Ensure the album is public/shared.";
                return;
            }

            // Duplicate images to ensure a seamless infinite scroll
            const displayList = [...images, ...images];
            
            displayList.forEach(src => {
                const imgNode = createImgElement(src);
                track.appendChild(imgNode);
            });

            status.innerText = "Gallery Ready. Hover over a photo to zoom.";
        }

        initApp();
    </script>
</body>
</html>
