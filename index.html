<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGMHSS Smart Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --accent: #38bdf8;
            --cream: rgba(255, 253, 230, 0.3);
            --h: 380px;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1 {
            margin: 60px 20px 20px;
            letter-spacing: 3px;
            font-size: 2.2rem;
            text-align: center;
        }

        .search-area {
            margin: 20px 0 30px;
            width: 90%;
            max-width: 720px;
            display: flex;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.25);
            border-radius: 50px;
            overflow: hidden;
            background: #1e293b;
        }

        #albumLink {
            flex: 1;
            padding: 18px 25px;
            border: none;
            background: transparent;
            color: white;
            font-size: 16px;
            outline: none;
        }

        #loadBtn {
            padding: 0 35px;
            background: var(--accent);
            color: #020617;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        #loadBtn:hover { background: white; transform: scale(1.05); }

        .ticker-frame {
            width: 100%;
            height: var(--h);
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            border-top: 1px solid #1e293b;
            border-bottom: 1px solid #1e293b;
            overflow: hidden;
            position: relative;
        }

        .track {
            display: flex;
            white-space: nowrap;
            animation: scroll 65s linear infinite;
            padding: 20px 0;
        }

        @keyframes scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .photo-wrap {
            position: relative;
            height: calc(var(--h) - 70px);
            margin: 0 18px;
            flex-shrink: 0;
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .photo-wrap img {
            height: 100%;
            width: auto;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .timestamp {
            position: absolute;
            bottom: 10px;
            right: 14px;
            font-family: 'Orbitron', sans-serif;
            color: var(--cream);
            font-size: 11px;
            text-align: right;
            line-height: 1.3;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        /* Full-screen zoom overlay */
        #zoom-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #zoom-overlay img {
            max-width: 92%;
            max-height: 92%;
            border-radius: 12px;
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
        }

        #status {
            color: #64748b;
            margin-top: 12px;
            font-size: 0.95rem;
            text-align: center;
            min-height: 1.2em;
        }

        .loading { color: var(--accent); }
    </style>
</head>
<body>

    <h1>SMART SCHOOL TICKER</h1>

    <div class="search-area">
        <input type="text" id="albumLink" placeholder="Paste Google Photos Album Link here...">
        <button id="loadBtn">LOAD</button>
    </div>
    
    <div id="status">Link will be saved for your next visit.</div>

    <div class="ticker-frame" id="frame">
        <div class="track" id="track"></div>
    </div>

    <!-- Zoom Overlay -->
    <div id="zoom-overlay">
        <img id="zoom-img" alt="Zoomed photo">
    </div>

    <script>
        const input = document.getElementById('albumLink');
        const track = document.getElementById('track');
        const frame = document.getElementById('frame');
        const status = document.getElementById('status');
        const zoomOverlay = document.getElementById('zoom-overlay');
        const zoomImg = document.getElementById('zoom-img');

        let resumeTimer = null;
        let isPaused = false;

        // Load saved link + auto-run
        window.onload = () => {
            const saved = localStorage.getItem('agmhss_album_link');
            if (saved) {
                input.value = saved;
                run();
            }
        };

        // Save on input change (optional debounce)
        input.addEventListener('change', () => {
            if (input.value.trim()) localStorage.setItem('agmhss_album_link', input.value.trim());
        });

        async function run() {
            const url = input.value.trim();
            if (!url) {
                status.textContent = "Please paste a valid Google Photos album link.";
                return;
            }

            localStorage.setItem('agmhss_album_link', url);
            track.innerHTML = '';
            frame.style.display = 'none';
            status.classList.add('loading');
            status.textContent = 'Fetching album from Google Photos...';

            try {
                // Try multiple CORS proxies
                let html = '';
                const proxies = [
                    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                    `https://corsproxy.io/?${encodeURIComponent(url)}`
                ];

                for (const proxy of proxies) {
                    try {
                        const res = await fetch(proxy);
                        if (!res.ok) throw new Error('Proxy failed');
                        const data = await res.json();
                        html = data.contents || data; // some proxies return {contents}, others raw
                        if (html && html.length > 5000) break;
                    } catch (e) {
                        console.warn('Proxy failed, trying next...', e);
                    }
                }

                if (!html || html.length < 10000) throw new Error("Could not load album. Make sure it's publicly shared.");

                // More robust regex for current Google Photos structure (2026)
                const regex = /https:\/\/(lh3\.googleusercontent\.com|photos\.fife\.usercontent\.google\.com)\/[a-zA-Z0-9\-_\/]+/g;
                let matches = [...html.matchAll(regex)].map(m => m[0]);

                // Deduplicate and clean
                const uniqueImages = [...new Set(matches)].filter(src => 
                    src.includes('lh3.googleusercontent.com') || src.includes('usercontent.google.com')
                );

                if (uniqueImages.length === 0) throw new Error("No photos found. Is the album public?");

                const dateStr = new Date().toLocaleDateString('en-GB', { 
                    day: '2-digit', month: '2-digit', year: 'numeric' 
                }).replace(/\//g, '-');

                // Duplicate the array for seamless infinite scroll
                const allImages = [...uniqueImages, ...uniqueImages];

                allImages.forEach(src => {
                    const wrap = document.createElement('div');
                    wrap.className = 'photo-wrap';

                    const img = document.createElement('img');
                    img.src = `${src}=w1400`;           // good quality for ticker + zoom
                    img.loading = 'lazy';
                    img.alt = 'School photo';

                    const meta = document.createElement('div');
                    meta.className = 'timestamp';
                    meta.innerHTML = `${dateStr}<br>BY: RAJARAJAN`;

                    wrap.append(img, meta);

                    // Click to zoom
                    wrap.addEventListener('click', () => {
                        zoomImg.src = `${src}=w2000`;   // higher res for zoom
                        zoomOverlay.style.display = 'flex';
                        pauseScroll();
                    });

                    track.appendChild(wrap);
                });

                frame.style.display = 'flex';
                status.classList.remove('loading');
                status.textContent = `Loaded ${uniqueImages.length} photos • Tap image to zoom • Scroll pauses on interaction`;

                // Touch / mouse interaction
                track.style.animationPlayState = 'running';

                const pauseScroll = () => {
                    track.style.animationPlayState = 'paused';
                    isPaused = true;
                    clearTimeout(resumeTimer);
                };

                const resumeScroll = () => {
                    track.style.animationPlayState = 'running';
                    isPaused = false;
                };

                track.addEventListener('mouseenter', pauseScroll);
                track.addEventListener('mouseleave', () => {
                    if (!isPaused) resumeScroll();
                });

                // Tap anywhere on track to toggle pause (great for touch devices)
                track.addEventListener('click', (e) => {
                    if (e.target.closest('#zoom-overlay')) return;
                    if (isPaused) resumeScroll();
                    else pauseScroll();
                });

                // Auto-resume after 12 seconds of inactivity
                track.addEventListener('mouseleave', () => {
                    clearTimeout(resumeTimer);
                    resumeTimer = setTimeout(() => {
                        if (!isPaused) resumeScroll();
                    }, 12000);
                });

            } catch (err) {
                status.classList.remove('loading');
                status.textContent = `Error: ${err.message}. Make sure the album is set to "Anyone with the link"`;
                console.error(err);
            }
        }

        // Button handler
        document.getElementById('loadBtn').addEventListener('click', run);

        // Close zoom overlay
        zoomOverlay.addEventListener('click', () => {
            zoomOverlay.style.display = 'none';
        });

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && zoomOverlay.style.display === 'flex') {
                zoomOverlay.style.display = 'none';
            }
        });
    </script>
</body>
    </html>
